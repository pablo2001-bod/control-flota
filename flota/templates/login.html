<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>CarServ - Iniciar Sesión</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@600;700&family=Ubuntu:wght@400;500&display=swap" rel="stylesheet"> 
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Ubuntu', sans-serif;
            background: #F2F5F9;
            height: 100vh;
        }
        .card-login {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        .btn-custom {
            background-color: #E53E3E; /* Rojo institucional CarServ */
            color: white;
            font-weight: 700;
        }
        .btn-custom:hover {
            background-color: #C53030;
            color: white;
        }
    </style>
</head>

<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <h2 class="text-dark fw-bold"><i class="fa fa-car text-danger me-2"></i>Auto Servicio</h2>
                    <p class="text-muted small">Plataforma de Control de Flotas e Inventario</p>
                </div>
                
                <div class="card card-login border-0 p-4 bg-white">
                    <h4 class="text-center fw-bold text-dark mb-4"> Acceso al Sistema</h4>
                    
                    {% if mensaje %}
                    <div class="alert alert-danger text-center p-2 small mb-3" role="alert">
                        <i class="fa fa-exclamation-circle me-1"></i> {{ mensaje }}
                    </div>
                    {% endif %}
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-secondary fw-bold small">Nombre de Usuario:</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa fa-user text-muted"></i></span>
                                <input type="text" name="username" class="form-control bg-light border-start-0 text-dark" placeholder="Ej. user123" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label text-secondary fw-bold small">Contraseña:</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa fa-lock text-muted"></i></span>
                                <input type="password" name="password" class="form-control bg-light border-start-0 text-dark" placeholder="••••••••" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-custom w-100 py-2 shadow-sm uppercase">
                            Ingresar <i class="fa fa-sign-in-alt ms-1"></i>
                        </button>
                    </form>
                </div>
                
                <p class="text-center text-muted small mt-4">&copy; 2026 CarServ S.A. Todos los derechos reservados.</p>
            </div>
        </div>
    </div>
</body>
</html>
