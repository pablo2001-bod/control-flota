{% extends "./plantillaPrincipal.html" %}
{% block contenido %}
    <div class="container">
        <div class="row">
            <div class="col-md-3"></div>
            <div class="col-md-6">
                <br>
                <h1><b>Registrar Nuevo Mantenimiento</b></h1>
                <hr>
                <!--Agregar esta nueva función: enctype="multipart/form-data"-->
                <form enctype="multipart/form-data" id="form_nuevo_estadio" action="/guardarMantenimiento/" method="post">
                    <!--Metodo de token para peticiones autorisadas, para enviar peticiones-->
                    <!--JINJA-->
                    {% csrf_token %}
                    <b>Vehículo (Placa):</b> <br>
                    <select required class="form-control" name="vehiculo">
                        <option value="">Seleccione el vehículo...</option>
                        {% for vehiculo in misVehiculos %}
                            <option value="{{ vehiculo.id }}">{{ vehiculo.placa }}</option>
                        {% endfor %}
                    </select>
                    <br>
                    <b>Fecha:</b> <br>
                    <input required class="form-control" type="date" name="fecha">
                    <br>
                    <b>Costo:</b> <br>
                    <input required placeholder="Ingrese el costo del mantenimiento" class="form-control" type="number" step="0.01" name="costo">
                    <br>
                    <b>Tipo Mantenimiento:</b> <br>
                    <input required placeholder="Ingrese el tipo de mantenimiento (Ej: Correctivo)" class="form-control" type="text" name="tipo_mantenimiento">
                    <br>
                    <b>Repuestos / Detalles:</b> <br>
                    <textarea required placeholder="Ingrese los repuestos o detalles de la orden" class="form-control" name="repuestos_detalles" rows="3"></textarea>
                    <br>
                    <!-- Agregar esta nueva función -->
                    <b>Diagnóstico (PDF)</b>
                    <input type="file" name="diagnostico_pdf" id="foto" accept="application/pdf">
                    <br> <br>
                    <div style="text-align: center; ">
                    <button class="btn btn-success" type="submit"> <i class="icon-save"></i> Guardar</button>
                    <a href="/listadodemantenimientos" class="btn btn-danger"> <i class="icon-close"></i> Cancelar</a>
                    </div>
                </form>

                <br>
            </div>
        </div>
    </div>
    <script>
        $("#form_nuevo_estadio").validate({
            reules:{
                vehiculo:{
                    required:true,
                },
                fecha:{
                    required:true,
                },
                costo:{
                    min:0,
                    number:true,
                    required:true
                },
                tipo_mantenimiento:{
                    required:true
                }
            },
            messages:{
                vehiculo:{
                    required:"Por favor seleccione un vehículo",
                },
                fecha:{
                    required:"Por favor ingrese la fecha",
                },
                costo:{
                    required:"Por favor ingrese el costo",
                    number: "Por favor introduzca un número válido",
                    min:"Debe ingresar un valor mayor o igual a 0"
                },
                tipo_mantenimiento:{
                    required:"Por favor ingrese el tipo de mantenimiento"
                }

            }
        });
    </script>
    
    <script>
          $("#foto").fileinput({
            language: "es",
            allowedFileExtensions: ["pdf"],
            showCaption: false,
            dropZoneEnabled: true,
            showClose: false
        });
        $(".fileinput-upload").hide();
    </script>
     
 {% endblock %}
