{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <title>Control de Flota - Nuevo Mantenimiento</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Mukta:300,400,700">
    <link rel="stylesheet" href="{% static 'fonts/icomoon/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <script src="{% static 'js/jquery-3.3.1.min.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="site-wrap">
        <div class="site-navbar bg-dark py-2">
            <div class="container">
                <h2 class="text-white mb-0">Gestión de Flota - Mantenimientos</h2>
            </div>
        </div>

        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card p-4 shadow">
                        <h3 class="mb-4 text-black text-center">Registrar Orden de Mantenimiento</h3>
                        
                        <form action="/guardarMantenimiento/" method="POST" id="formMantenimiento" enctype="multipart/form-data">
                            {% csrf_token %}

                            <div class="form-group mb-3">
                                <label for="fecha_servicio" class="text-black fw-bold">Fecha del Servicio:</label>
                                <input type="date" name="fecha_servicio" id="fecha_servicio" class="form-control" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="costo_taller" class="text-black fw-bold">Costo del Taller ($):</label>
                                <input type="number" name="costo_taller" id="costo_taller" class="form-control" step="0.01" min="0" required placeholder="0.00">
                            </div>

                            <div class="form-group mb-3">
                                <label class="text-black fw-bold d-block">Tipo de Mantenimiento:</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="tipo_mantenimiento" id="preventivo" value="Preventivo" checked>
                                    <label class="form-check-label text-black" for="preventivo">Preventivo</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="tipo_mantenimiento" id="correctivo" value="Correctivo">
                                    <label class="form-check-label text-black" for="correctivo">Correctivo</label>
                                </div>
                            </div>

                            <div class="form-group mb-3">
                                <label for="repuestos_cambiados" class="text-black fw-bold">Repuestos Cambiados:</label>
                                <textarea name="repuestos_cambiados" id="repuestos_cambiados" class="form-control" rows="3" required placeholder="Describa los repuestos o arreglos realizados..."></textarea>
                            </div>

                            <div class="form-group mb-4">
                                <label for="pdf" class="text-black fw-bold">Hoja de Diagnóstico / Factura (PDF):</label>
                                <input type="file" name="pdf" id="pdf" class="form-control-file" accept=".pdf" required>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/listadodemantenimientos/" class="btn btn-secondary py-2 px-4">Ver Listado</a>
                                <button type="submit" class="btn btn-primary py-2 px-4">Registrar Mantenimiento</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $("#formMantenimiento").validate({
                rules: {
                    fecha_servicio: { required: true },
                    costo_taller: { required: true, number: true, min: 0 },
                    repuestos_cambiados: { required: true },
                    pdf: { required: true }
                },
                messages: {
                    fecha_servicio: "Por favor, ingrese la fecha del servicio.",
                    costo_taller: "Ingrese un costo válido mayor o igual a 0.",
                    repuestos_cambiados: "Escriba qué repuestos fueron sustituidos.",
                    pdf: "Es obligatorio subir el documento de respaldo en PDF."
                }
            });
        });
    </script>
</body>
</html>
