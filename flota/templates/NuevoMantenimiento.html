{% extends "./plantillaPrincipal.html" %}
{% block contenido %}
    <div class="container">
        <div class="row">
            <div class="col-md-3"></div>
            <div class="col-md-6">
                <br>
                <h1><b>Registrar Nuevo Mantenimiento</b></h1>
                <hr>
                <form enctype="multipart/form-data" id="form_nuevo_mantenimiento" action="/guardarMantenimiento/" method="post">
                    {% csrf_token %}
                    
                    <b>Vehículo (Placa):</b> <br>
                    <select required class="form-control" name="vehiculo_id">
                        <option value="">Seleccione el vehículo...</option>
                        {% for vehiculo in vehiculos %}
                            <option value="{{ vehiculo.id }}">{{ vehiculo.placa }}</option>
                        {% endfor %}
                    </select>
                    <br>
                    
                    <b>Fecha del servicio:</b> <br>
                    <input required class="form-control" type="date" name="fecha_servicio">
                    <br>
                    
                    <b>Costo del taller:</b> <br>
                    <input required placeholder="Ingrese el costo del mantenimiento" class="form-control" type="number" step="0.01" name="costo_taller">
                    <br>
                    
                    <b>Tipo de mantenimiento:</b> <br>
                    <div class="form-check form-check-inline">
                        <input required class="form-check-input" type="radio" name="tipo_mantenimiento" id="preventivo" value="Preventivo">
                        <label class="form-check-label" for="preventivo">Preventivo</label>
                    </div>
                    &nbsp;&nbsp;&nbsp;
                    <div class="form-check form-check-inline">
                        <input required class="form-check-input" type="radio" name="tipo_mantenimiento" id="correctivo" value="Correctivo">
                        <label class="form-check-label" for="correctivo">Correctivo</label>
                    </div>
                    <br><br>
                    
                    <b>Repuestos cambiados:</b> <br>
                    <textarea required placeholder="Ingrese los repuestos o detalles de la orden" class="form-control" name="repuestos_cambiados" rows="3"></textarea>
                    <br>
                    
                    <b>Diagnóstico o Factura (PDF):</b> <br>
                    <input type="file" name="pdf_diagnostico" id="foto" accept="application/pdf">
                    <br> <br>
                    
                    <div style="text-align: center; ">
                        <button class="btn btn-success" type="submit"> <i class="icon-save"></i> Guardar</button>
                        <a href="/listadodemantenimientos" class="btn btn-danger"> <i class="icon-close"></i> Cancelar</a>
                    </div>
                </form>
                <br>
            </div>
        </div>
    </div>
    
    <script>
        $("#form_nuevo_mantenimiento").validate({
            rules:{
                vehiculo_id:{ required:true },
                fecha_servicio:{ required:true },
                costo_taller:{ min:0, number:true, required:true },
                tipo_mantenimiento:{ required:true },
                repuestos_cambiados:{ required:true }
            },
            messages:{
                vehiculo_id:{ required:"Por favor seleccione un vehículo" },
                fecha_servicio:{ required:"Por favor ingrese la fecha del servicio" },
                costo_taller:{
                    required:"Por favor ingrese el costo",
                    number: "Por favor introduzca un número válido",
                    min:"Debe ingrese un valor mayor o igual a 0"
                },
                tipo_mantenimiento:{ required:"Por favor seleccione el tipo de mantenimiento" },
                repuestos_cambiados:{ required:"Por favor ingrese los repuestos cambiados" }
            },
            errorPlacement: function(error, element) {
                if (element.attr("type") == "radio") {
                    error.insertAfter(element.parent().parent());
                } else {
                    error.insertAfter(element);
                }
            }
        });
    </script>
    
    <script>
        $("#foto").fileinput({
            language: "es",
            allowedFileExtensions: ["pdf"],
            showCaption: false,
            dropZoneEnabled: true,
            showClose: false
        });
        $(".fileinput-upload").hide();
    </script>
{% endblock %}
