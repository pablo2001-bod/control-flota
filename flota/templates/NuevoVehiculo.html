{% extends "./plantillaPrincipal.html" %}
{% block contenido %}
    <div class="container">
        <div class="row">
            <div class="col-md-3"></div>
            <div class="col-md-6">
                <br>
                <h1><b>Registrar Nuevo Vehículo</b></h1>
                <hr>
                <form enctype="multipart/form-data" id="form_nuevo_vehiculo" action="/guardarVehiculo/" method="post">
                    {% csrf_token %}
                    <b>Placa:</b> <br>
                    <input required minlength="7" maxlength="10" placeholder="Ingrese la placa del vehículo" class="form-control" type="text" name="placa">
                    <br>
                    <b>Tipo de Vehículo:</b> <br>
                    <input required placeholder="Ingrese el tipo de vehículo" class="form-control" type="text" name="tipo_vehiculo">
                    <br>
                    <b>Tipo de Combustible:</b> <br>
                    <input required placeholder="Ingrese el tipo de combustible" class="form-control" type="text" name="tipo_combustible">
                    <br>
                    <b>Año del Modelo:</b> <br>
                    <input required placeholder="Ingrese el año de fabricación" class="form-control" type="number" name="anio_modelo">
                    <br>
                    <b>¿Tiene seguro vigente?</b> &nbsp;
                    <input type="checkbox" name="seguro_vigente" value="True" style="transform: scale(1.2); vertical-align: middle;">
                    <br><br>
                    <b>Fotografía</b>
                    <input type="file" name="foto" id="foto">
                    <br> <br>
                    <div style="text-align: center; ">
                    <button class="btn btn-success" type="submit"> <i class="icon-save"></i> Guardar</button>
                    <a href="/listadodevehiculos" class="btn btn-danger"> <i class="icon-close"></i> Cancelar</a>
                    </div>
                </form>

                <br>
            </div>
        </div>
    </div>
    <script>
        $("#form_nuevo_vehiculo").validate({
            reules:{
                placa:{
                    required:true,
                },
                anio_modelo:{
                    number:true,
                    required:true
                },
                tipo_vehiculo:{
                    required:true
                }
            },
            messages:{
                placa:{
                    required:"Por favor ingrese la placa del vehículo",
                },
                anio_modelo:{
                    required:"Por favor ingrese el año",
                    number: "Por favor introduzca un números validos"
                },
                tipo_vehiculo:{
                    required:"Por favor ingrese el tipo de vehículo"
                }

            }
        });
    </script>
    
    <script>
          $("#foto").fileinput({
            language: "es",
            allowedFileExtensions: ["png|jpg|jpeg"],
            showCaption: false,
            dropZoneEnabled: true,
            showClose: false
        });
        $(".fileinput-upload").hide();
    </script>
     
 {% endblock %}
