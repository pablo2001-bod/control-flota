{% extends "./plantillaPrincipal.html" %}
{% block contenido %}
    <div class="container">
        <div class="row">
            <div class="col-md-3"></div>
            <div class="col-md-6">
                <br>
                <h1><b>Registrar Nuevo Vehículo</b></h1>
                <hr>
                
                <form enctype="multipart/form-data" id="form_nuevo_vehiculo" action="/guardarVehiculo/" method="post">
                    {% csrf_token %}
                    
                    <b>Placa:</b> <br>
                    <input required minlength="7" maxlength="10" placeholder="Ingrese la placa (Ej: PXX-1234)" class="form-control" type="text" name="placa">
                    <br>
                    
                    <b>Tipo de Vehículo:</b> <br>
                    <select required class="form-control" name="tipo_vehiculo">
                        <option value="">-- Seleccione una opción --</option>
                        <option value="Sedán">Sedán</option>
                        <option value="Camioneta">Camioneta</option>
                        <option value="Camión">Camión</option>
                    </select>
                    <br>
                    
                    <b>Tipo de Combustible:</b> <br>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="tipo_combustible" id="gasolina" value="Gasolina" checked>
                        <label class="form-check-label" for="gasolina">Gasolina</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="tipo_combustible" id="diesel" value="Diésel">
                        <label class="form-check-label" for="diesel">Diésel</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="tipo_combustible" id="electrico" value="Eléctrico">
                        <label class="form-check-label" for="electrico">Eléctrico</label>
                    </div>
                    <br><br>
                    
                    <b>¿Tiene seguro vigente?</b> &nbsp;
                    <input type="checkbox" name="seguro_vigente" value="True" style="transform: scale(1.3); vertical-align: middle;">
                    <br><br>
                    
                    <b>Año del Modelo:</b> <br>
                    <input required placeholder="Ingrese el año de fabricación" class="form-control" type="number" name="anio_modelo">
                    <br>
                    
                    <b>Foto Real de la Fachada:</b>
                    <input class="form-control" type="file" name="foto" id="foto" accept="image/*" required>
                    <br> <br>
                    
                    <div style="text-align: center;">
                        <button class="btn btn-success" type="submit"> <i class="icon-save"></i> Guardar</button>
                        <a href="/listadodevehiculos" class="btn btn-danger"> <i class="icon-close"></i> Cancelar</a>
                    </div>
                </form>
                <br>
            </div>
        </div>
    </div>
{% endblock %}
